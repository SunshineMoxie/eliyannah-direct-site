continuityNum: Section B · Continuity
continuityTitle: What *stays the same* in every project that comes from me.
continuity:
  - >-
    Black people are the whole of the frame. We are not a point the frame is
    trying to make.
  - >-
    Chicago is specific. The south side is specific. The Black Midwest is
    specific. Every city I shoot in gets the same attention I give my own.
  - Shooting on *film* considered. Because the medium is part of the argument.
  - There are no limits to my Black imagination.
  - The audience I am working for is the audience inside the frame.
studioNum: Section C · Below The Line History
studioTitle: The *studio* years.
studioBody: >-
  Over ten years in scripted production in Hollywood — Sony. FOX. NBC. HBO.
  Lionsgate. ABC / Disney. Paramount. Warner Brothers. Never worked above the
  line at the studio level but worked *adjacent* to it, working as crew,
  primarily in production and logistics.


  The résumé version is in the press kit, the useful version is the one I
  already carry: a working knowledge of how a studio show functions, what a real
  budget conversation sounds like, and how decisions are made that shape the
  work before the director ever sees the set. Understanding production has made
  me a stronger director. 
