continuityNum: Section B · Continuity
continuityTitle: What *stays the same* in every project.
continuity:
  - >-
    Black people are the whole of the frame. We are not a point the frame is
    trying to make.
  - >-
    Chicago is specific. The south side is specific. The Black Midwest is
    specific. Every city I shoot in gets the same attention I give my own.
  - Shot on film. Because the medium is part of the argument.
  - There are no limits to my Black imagination.
  - The audience I am working for is the audience inside the frame.
studioNum: Section C · Below The Line History
studioTitle: The *studio* years.
studioBody: >
  Ten years in scripted production in Hollywood — in the rooms where studio
  television actually gets made. Sony. FOX. NBC. HBO. Lionsgate. ABC / Disney.
  Paramount. Warner Brothers. Not above the line. *Adjacent* to it, running the
  crew-facing logistics that turn a greenlight into a show.


  The résumé version is in the press kit. The useful version is the one I
  already carry: a working knowledge of how a studio crew actually functions,
  what a real budget conversation sounds like, and how producers make the
  decisions that shape the work before the director ever sees the set. That is
  the credential. It is what makes the directing serious.
