number: '02'
label: The Reading List
title: What's *open* on the nightstand right now.
body: >-
  With June being Black History Month part 2, I always feel moved to read some
  Black history. So I'm reading ['On Juneteenth' by Annette Gordon-Reed]
  (https://www.smithsonianstore.com/on-juneteenth-10994/), looking over and
  being wildly humbled by ['W.E.B. Du Bois's Data Portraits: Visualizing Black
  Life']
  (https://papress.com/products/w-e-b-du-boiss-data-portraits-visualizing-black-america)
  in which he literally creates the concept of data portraits ([which can also
  be seen in their entirety here] (https://dataxdesign.io/chapters/dubois)) and
  I'm working my way through ['Plot, from the Elements of Fiction Writing'
  series]
  (https://www.thriftbooks.com/w/plot_ansen-dibell/296655/#edition=1877870&idiq=4025126). 


  I'm working on a historical, family epic so I gotta sharpen my tools!
