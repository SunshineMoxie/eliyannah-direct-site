number: '01'
label: The Recipe
title: The *chocolate chip cookie* that won.
body: >-
  BOX: I've been baking chocolate chip cookies since I was about 8 or 9 years
  old. It's my favorite cookie, the same as it is for millions of people in the
  world lol. I've been gladly acting as a sacrifice and testing different
  recipes for years, always bouncing around waiting for my favorite to come
  through. A few years ago it did and I've been a faithful devotee since. Chef
  Thomas Keller's *Ad Hoc at Home* chocolate chip cookie.


  You should definitely buy the actual recipe book if you're so inclined, but
  the recipe is also [shared fairly widely
  online](https://stylecaster.com/lifestyle/food-and-drink/318482/chef-thomas-keller-perfect-chocolate-chip-cookies/).
  Enjoy!!
