number: '01'
label: The Recipe
title: The *chocolate chip cookie* that won.
body: >-
  PROMPT: I've been baking chocolate chip cookies since I was about 8 or 9 years
  old. It's my favorite cookie, the same as it is for millions of people in the
  world lol. I've been testing different recipes, gladly, and always bouncing
  around waiting for my favorite to come through. A few years ago it did and
  I've been a faithful devotee since. Chef Thomas Keller's *Ad Hoc at Home*
  chocolate chip cookie. 



  You should definitely buy the actual recipe book if you're so inclined, but
  it's also shared fairly widely online [text]
  https://stylecaster.com/lifestyle/food-and-drink/318482/chef-thomas-keller-perfect-chocolate-chip-cookies/
  [text]. Enjoy!
