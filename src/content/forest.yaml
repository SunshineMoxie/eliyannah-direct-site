title: The *Forest* of God's Answers
subtitle: The parent company and what I mean when I say I am *building*.
intro: >
  The Forest of God's Answers is a holding company and a naming system. It's the
  roof over every business I am building, and it is the philosophy that keeps
  them related to each other.


  I needed to stop limiting myself creatively, holding parts of myself back
  because I hadn't achieved success in other areas first. I needed to let my
  full self grow and fly, so I built a forest to hold it *all*. 


  Inside the forest are *copses* — groves of related businesses organized by
  what they do. Sunshine Moxie is the film and television copse. A Foremother's
  Brand is the retail copse. Black Town Square is the community copse. Each
  copse will eventually have its own dedicated spaces, its own audience, and its
  own *branch letter* — a dedicated newsletter for readers who want to go deeper
  on that specific world.


  The mothership newsletter, *From the Forest*, is the view from above — one
  monthly letter from me, covering what I am building across all of it, planted
  on May 3, 2026.
introEmphasis: >-
  Every copse is its own thing, an area for my creativity....they share a
  forest.
etymology:
  label: Etymology
  word: Eliyannah
  pronunciation: el·ee·YAH·nah · Hebrew
  meaning: '"My God has answered."'
  translatesTo: The forest is the answer, every copse is a deeper answer.
copsesHeading: The Copses
copsesTitle: Three *groves*, one forest.
copsesIntro: >-
  Each copse holds multiple businesses, each with its own name and identity. The
  copse is the organizing principle and the businesses are where the work
  actually happens.
copses:
  - number: Copse · 01
    name: Sunshine *Moxie*
    status: In Motion
    inMotion: true
    current: true
    tagline: High art Black cinema, live theater, television.
    blurb: >-
      The motion picture copse. Where the films, the shows, and the cultural
      criticism live. Currently home to my first feature and some virtual shows,
      all in development. Excited to share stories with you!
    brands: >-
      Sunshine Moxie Films · Sunshine Moxie Productions · Sunshine Moxie
      Creative
  - number: Copse · 02
    name: A Foremother's *Brand*
    status: Building
    inMotion: false
    current: false
    tagline: Luxury retail and lifestyle, named for the women who built me.
    blurb: >-
      This is the retail copse. Each brand inside it carries one of my
      foremother's names and holds her legacy inside the product. Luxury leather
      goods. Stationery for people who still write by hand. Accessories for book
      lovers. An event design company. A creative admin agency. Heirloom is the
      coming branch letter.
    brands: >-
      Maggie Bell 1915 · Pearl 1888 · Morgan & Melissa · The Alice Morgan Agency
      · EveLuxe Table Co
  - number: Copse · 03
    name: Black Town *Square*
    status: Dreaming
    inMotion: false
    current: false
    tagline: >-
      Creative community, creative education, creative gathering, cultural
      retention.
    blurb: >-
      The placemaking copse — home to the cultural festivals, co-working spaces,
      the artisan guild, classical arts academies, arts-and-tech centers, and
      The Community Apostles. This is where the forest touches the ground in
      every neighborhood it serves, teaching, learning about and protecting
      Black American culture. The Gathering is the coming branch letter.
    brands: >-
      The Lakeshore Guild · American Negro Cultural Academies · Art & Tech
      Centers · The Community Apostles
signupEyebrow: The Mothership · Monthly · Planted May 3
signupTitle: '*From the Forest* — one letter, the view from above.'
signupBody: >-
  A personal letter from me, once a month. What I'm writing, directing,
  building, and reading. Cultural commentary, behind-the-scenes updates across
  every copse, and the books, films, and people currently feeding the work. The
  mothership every branch letter flows out of.
signupFootnote: No spam. Monthly. Unsubscribe anytime.
