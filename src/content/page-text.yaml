directorStatement: >-
  I make cinema for Black America. 


  Hood New Wave, films with the formal seriousness of Italian Neorealism and the
  raw subjectivity of a Drill-era music video, shot on film, for the people the
  films are about. Fantasy, imagining worlds and magic and powers that reach the
  communities we inhabit and the ones to be created. Literary work that reaches
  deep into the hearts and minds of its subjects, movies with real meaning to
  and real stakes for the characters that live in them. 


  My work is character driven. My specialty is drama. My focus is the Black
  Midwest, the region too often left out of the story of Black America.


  ***


  For those in the business, you'll recognize that I've designed my site like a
  call sheet. I like when websites feel alive and like a place I can browse and
  spend time, I hope you'll spend some time with me here! For those not in the
  business, I love being on set and call sheets are the documents we receive
  everyday during production. It tells the who, what, where, why, when and how
  of a shooting day. 


  I love call sheets. I love reading them, love the details, and I love that
  whenever I send or receive one, it means I'm a part of a production and we're
  making movie magic. Set is my happy place, and call sheets are the proof they
  exist. So it seemed like the perfect way to carve out out my little corner of
  the internet. Enjoy, and come often!
workEyebrow: Section 02 · Scenes
workTitle: The *Work*
workSubtitle: >-
  On this site, every project or collection is a scene and every scene builds on
  what came before it or what's coming after. The scenes are a culmination of my
  practice, my learning, my love of directing and storytelling.
pressEyebrow: Section 05 · Press
pressTitle: The *Notes* Page
pressSubtitle: >-
  What the outlets have said so far. The goal is to keep them talking (about the
  work)
pressIntro: >-
  Most of the press below was earned for my webseries, "Hermione Granger and the
  Quarter Life Crisis". Yes, the coverage is older than ideal. But the fact that
  the outlets are *real*, and that their coverage was, too, is what matters. 


  More is coming. 
craftEyebrow: Section 07 · Craft Services
craftTitle: Craft *Services*
craftSubtitle: 'The snack table (in the hallway) where the crew actually meets each other. '
craftIntro: >-
  On a set, craft services is where you figure out who everybody is bit by bit.
  Here: the things outside the work that are still very much the work. The
  recipes. The books. The playlists. The (Chicago) spots. This is a room kept
  deliberately lite and fun, a chance for you to know me, bit by bit.
dailiesEyebrow: Section 06 · Dailies — Pink Revision
dailiesTitle: The *Dailies*
dailiesSubtitle: Notes from the day. What I'm working on and can't stop thinking about.
dailiesIntro: >-
  On a production, *dailies* are the footage from the day — raw, current, proof
  that something happened. On this site, the dailies are short writings; they're
  a notebook that's public.


  I don't see this as a blog or a newsletter. (The newsletter is *From the
  Forest*, and it lives elsewhere.) It's just a place where the working
  vocabulary accumulates — "butterfly work," "Hood New Wave," "cinematic
  ministry", where short thoughts land before they are long ones.
