# Page headers and standalone intro prose for the pages that don't have their
# own singleton. All copy preserved verbatim from the live pages.

directorStatement: >-
  I make Hood New Wave cinema for Black America. Films with the formal
  seriousness of Italian Neorealism and the raw subjectivity of a Drill-era
  music video, shot on film, for the people the films are about. My focus is the
  Black Midwest, the region too often left out of the story of Black America.
  The stories of Black America deserve high art the people who live those
  stories can actually watch. That is what the work is for.

workEyebrow: "Section 02 · Scenes"
workTitle: "The *Work*"
workSubtitle: "Every project is a scene. Every scene is the whole argument for what comes next."

pressEyebrow: "Section 05 · Press"
pressTitle: "The *Notes* Page"
pressSubtitle: "What the serious outlets have said so far."
pressIntro: >-
  Most of the press below was earned for Hermione Granger and the Quarter Life
  Crisis. The coverage is older than ideal. The fact that the outlets are *real*,
  and that their coverage was, too, is what matters. More is coming. Journalists,
  this page will be active again soon.

craftEyebrow: "Section 07 · Craft Services"
craftTitle: "Craft *Services*"
craftSubtitle: "The table in the hallway. Where the crew actually meets each other."
craftIntro: >-
  On a set, craft services is where you figure out who everybody is. Here: the
  things outside the work that are still very much the work. The recipes. The
  books. The playlists. The Chicago spots. A room kept deliberately fun on a
  serious site.

dailiesEyebrow: "Section 06 · Dailies — Pink Revision"
dailiesTitle: "The *Dailies*"
dailiesSubtitle: "Notes from the day. What I'm working on. What I just read. What I can't stop thinking about."
dailiesIntro: |
  On a production, *dailies* are the footage from the day — raw, current, proof that something happened. On this site, the dailies are short writing. The notebook that happens to be public.

  Not a blog. Not a newsletter. (The newsletter is *From the Forest*, and it lives elsewhere.) This is the place where the working vocabulary accumulates — "butterfly work," "Hood New Wave," "cinematic ministry" — and where short thoughts land before they are long ones.
